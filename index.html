<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBARIG AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           1. CSS CONFIG & THEME (Gaya Elegan Mirip Gemini Advanced)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --bg-body: #f8fafc;
            --bg-container: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --user-msg-bg: #eff6ff;
            --ai-msg-bg: #f1f5f9;
            --border-color: #e2e8f0;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 92vh;
            background: var(--bg-container);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin: 20px;
        }

        /* HEADER */
        .app-header {
            padding: 18px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand .logo-icon {
            background: var(--primary-gradient);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-clear {
            background: none;
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            background-color: #fef2f2;
            color: #ef4444;
            border-color: #fee2e2;
        }

        /* CHAT WINDOW */
        .chat-area {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            background-color: #fdfefe;
            scroll-behavior: smooth;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            color: var(--text-muted);
        }

        .welcome-screen i {
            font-size: 3.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .welcome-screen p {
            margin-top: 8px;
            max-width: 400px;
            font-size: 0.95rem;
        }

        /* BUBBLE CHAT */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: #1e40af;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .message img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-bottom: 10px;
            object-fit: contain;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* PANEL BAWAH (INPUT & PREVIEW) */
        .input-panel {
            padding: 20px 28px;
            background-color: #ffffff;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Preview Gambar Sebelum Dikirim */
        .image-preview-container {
            display: none;
            align-items: center;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 14px;
            width: max-content;
            max-width: 100%;
            border: 1px solid var(--border-color);
            gap: 10px;
            position: relative;
        }

        .image-preview-container img {
            height: 60px;
            width: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .btn-remove-preview {
            background: #ef4444;
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -5px;
            right: -5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Form Bar */
        .input-bar-wrapper {
            display: flex;
            align-items: center;
            background-color: #f1f5f9;
            border-radius: 30px;
            padding: 8px 10px 8px 20px;
            border: 1px solid transparent;
            transition: all 0.3s;
            gap: 12px;
        }

        .input-bar-wrapper:focus-within {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .input-bar-wrapper input {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            font-size: 1rem;
            padding: 8px 0;
            color: var(--text-main);
        }

        .btn-action {
            background: none;
            border: none;
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.15rem;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background-color: #e2e8f0;
            color: var(--text-main);
        }

        .btn-send {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-send:hover {
            transform: scale(1.05);
            color: white;
        }

        #fileInput {
            display: none;
        }

        /* LOADING ANIMATION */
        .loading-dots {
            display: flex;
            gap: 6px;
            padding: 4px 0;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .app-container { height: 100vh; margin: 0; border-radius: 0; border: none; }
            .message { max-width: 90%; }
        }
        .btn-action {
    background: none;
    border: none;
    color: var(--text-muted);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.15rem;
    transition: all 0.2s;
    
    /* TAMBAHKAN 3 BARIS INI AGAR TIDAK DI-HIGHLIGHT DI HP */
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <div class="logo-icon"><i class="fa-solid fa-brain"></i></div>
                <div>
                    <h1>E-BARIG AI</h1>
                </div>
            </div>
            <button class="btn-clear" id="clearBtn">
                <i class="fa-solid fa-rotate-left"></i> Sesi Baru
            </button>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="welcome-screen" id="welcomeScreen">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <h2>Apakah ada pertanyaan?</h2>
                <p>project ai pertama buatan sendiri, jadi kalo ada bug mohon untuk melapor.  terimakasih</p>
            </div>
        </main>

        <footer class="input-panel">
            <div class="image-preview-container" id="previewContainer">
                <button class="btn-remove-preview" id="removePreviewBtn"><i class="fa-solid fa-xmark"></i></button>
                <img id="imagePreview" src="" alt="Pratinjau">
                <span style="font-size: 0.8rem; color: var(--text-muted);" id="fileNameSpan">gambar.jpg</span>
            </div>

            <div class="input-bar-wrapper">
                <input type="file" id="fileInput" accept="image/*">
                <button class="btn-action" id="attachBtn" title="Unggah Foto Tugas/PR">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                
                <input type="text" id="userInput" placeholder="Tanyakan sesuatu atau jelaskan instruksi tugas foto ini..." autocomplete="off">
                
                <button class="btn-action btn-send" id="sendBtn">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </footer>
    </div>

    <script>
        // --- AMBIL API KEY GROQ ---
        const GROQ_API_KEY = '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'; 
        const MODEL_NAME = 'llama-3.3-70b-versatile';

        // Elemen HTML
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const fileInput = document.getElementById('fileInput');
        const attachBtn = document.getElementById('attachBtn');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const removePreviewBtn = document.getElementById('removePreviewBtn');
        const fileNameSpan = document.getElementById('fileNameSpan');

        let currentBase64Image = null; // Menyimpan data string gambar jika ada

        // Pemicu Klik File Input sewaktu tombol klip ditekan
        attachBtn.addEventListener('click', () => fileInput.click());

        // Event sewaktu user memilih file foto
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'flex';
                    // Mengambil data string base64 murni (menghapus bagian data:image/...;base64,)
                    currentBase64Image = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // Hapus Foto Preview
        removePreviewBtn.addEventListener('click', () => {
            clearImagePreview();
        });

        function clearImagePreview() {
            fileInput.value = '';
            currentBase64Image = null;
            previewContainer.style.display = 'none';
            imagePreview.src = '';
        }

        // Fungsi Mengirim Pesan dan Foto ke Groq
        async function handleSendMessage() {
            const text = userInput.value.trim();
            
            // Minimal harus ada teks atau ada gambar yang dikirim
            if (!text && !currentBase64Image) return;

            if (welcomeScreen) welcomeScreen.style.display = 'none';

            // Tampilkan chat user ke layar (beserta gambarnya jika ada)
            appendUserMessage(text, currentBase64Image);
            
            // Simpan variabel teks dan gambar untuk dikirim, lalu reset input komponen
            const promptText = text || "Tolong analisis gambar ini.";
            const base64Data = currentBase64Image;
            
            userInput.value = '';
            clearImagePreview();

            // Jalankan animasi loading
            const loadingId = appendLoadingIndicator();

            try {
                // Perbaikan Pengecekan Pengunci yang Salah Kemarin
                if (!GROQ_API_KEY || GROQ_API_KEY.includes('TEMPEL_API_KEY')) {
                    throw new Error("Kunci API Groq belum diisikan dengan benar di variabel GROQ_API_KEY.");
                }

                // Bangun struktur pesan sesuai spesifikasi API Vision Groq / OpenAI
                let messageContent = [];
                
                // 1. Masukkan teks instruksi user
                messageContent.push({ type: "text", text: promptText });
                
                // 2. Jika ada gambar, masukkan skema URL berbasis Base64
                if (base64Data) {
                    messageContent.push({
                        type: "image_url",
                        image_url: {
                            url: base64Data // Berisi string lengkap "data:image/jpeg;base64,..."
                        }
                    });
                }

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            {
                                role: "system",
                                content: "Anda adalah Guru Privat Digital dan Asisten Pintar Multimodal. Tugas Anda membantu siswa menyelesaikan PR, mengoreksi jawaban dari foto, menguraikan langkah matematika, atau menjelaskan konten gambar dengan sangat sabar, detail, terstruktur, dan mudah dipahami. dan jika anda ditanyai siapa yang membuat kamu maka kamu jawab dengan tegas saya e-barig ai dibuat oleh agung atau julukanya tole."                            },
                            {
                                role: "user",
                                content: messageContent
                            }
                        ],
                        temperature: 0.5
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "Koneksi API bermasalah.");
                }

                const data = await response.json();
                const aiResult = data.choices[0].message.content;

                removeLoadingIndicator(loadingId);
                appendAiMessage(aiResult);

            } catch (error) {
                console.error(error);
                removeLoadingIndicator(loadingId);
                appendAiMessage(`⚠️ Gagal memproses: ${error.message}`);
            }
        }

        // Tampilkan gelembung pesan user
        function appendUserMessage(text, imageSrc) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'user');

            if (imageSrc) {
                const img = document.createElement('img');
                img.src = imageSrc;
                msgDiv.appendChild(img);
            }

            if (text) {
                const txtNode = document.createElement('span');
                txtNode.innerHTML = text.replace(/\n/g, '<br>');
                msgDiv.appendChild(txtNode);
            }

            chatArea.appendChild(msgDiv);
            scrollToBottom();
        }

        // Tampilkan gelembung respon AI
        function appendAiMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'ai');
            msgDiv.innerHTML = text.replace(/\n/g, '<br>'); // Format sederhana untuk line-break
            chatArea.appendChild(msgDiv);
            scrollToBottom();
        }

        // Indikator Titik Berpikir
        function appendLoadingIndicator() {
            const loadingDiv = document.createElement('div');
            const uniqueId = 'loader-' + Date.now();
            loadingDiv.id = uniqueId;
            loadingDiv.classList.add('message', 'ai');
            loadingDiv.innerHTML = `
                <div class="loading-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            chatArea.appendChild(loadingDiv);
            scrollToBottom();
            return uniqueId;
        }

        function removeLoadingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Hapus kode sendBtn.addEventListener lama, ganti dengan versi terpadu ini:
const triggerSubmit = (e) => {
    e.preventDefault();
    handleSendMessage();
};

sendBtn.addEventListener('click', triggerSubmit);

// Tangani keyboard enter di HP dengan aman
userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        handleSendMessage();
    }
});
    </script>
</body>
</html>
