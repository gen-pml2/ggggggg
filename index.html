<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-BARIG AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ==========================================================================
           1. CSS CONFIG & THEME 
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --bg-body: transparent;
            --bg-container: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --user-msg-bg: #2563eb;
            --user-msg-text: #ffffff;
            --ai-msg-bg: rgba(248, 250, 252, 0.7);
            --border-color: rgba(226, 232, 240, 0.8);
            --input-wrapper-bg: rgba(241, 245, 249, 0.8);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --sidebar-bg: rgba(248, 250, 252, 0.9);
            --hover-color: rgba(226, 232, 240, 0.9);
            --glow-color: transparent;
        }

        body.dark-mode {
            --bg-container: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg-bg: #ea580c;
            --user-msg-text: #ffffff;
            --ai-msg-bg: rgba(15, 23, 42, 0.6);
            --border-color: rgba(51, 65, 85, 0.8);
            --input-wrapper-bg: rgba(15, 23, 42, 0.6);
            --primary-gradient: linear-gradient(135deg, #ea580c 0%, #d97706 100%);
            --sidebar-bg: rgba(15, 23, 42, 0.9);
            --hover-color: rgba(51, 65, 85, 0.9);
        }

        /* TEMA BARU: NEON CODING MODE */
        body.coding-mode {
            --bg-container: rgba(5, 15, 30, 0.85);
            --text-main: #00f0ff;
            --text-muted: #00a8ff;
            --user-msg-bg: #00a8ff;
            --user-msg-text: #050f1e;
            --ai-msg-bg: rgba(10, 25, 50, 0.7);
            --border-color: #00f0ff;
            --input-wrapper-bg: rgba(5, 15, 30, 0.9);
            --primary-gradient: linear-gradient(135deg, #00f0ff 0%, #0044ff 100%);
            --sidebar-bg: rgba(5, 15, 30, 0.95);
            --hover-color: rgba(0, 240, 255, 0.2);
            --glow-color: 0 0 15px #00f0ff;
        }

        body {
            background-color: transparent !important;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        #galaxyCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: #f1f5f9;
            transition: background 0.5s ease;
        }

        body.dark-mode #galaxyCanvas { background: #0f172a; }
        body.coding-mode #galaxyCanvas { background: #020617; }

        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 95vh;
            height: 95dvh;
            background: var(--bg-container);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), var(--glow-color);
            display: flex;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin: 20px;
            position: relative;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100; /* TAMBAHKAN BARIS INI */
        }

        /* EFEK FLASH ANIMASI SAAT MENGAKTIFKAN CODING MODE */
        .flash-animation {
            animation: neonGlitch 0.4s ease-in-out;
        }
        @keyframes neonGlitch {
            0% { opacity: 0.3; filter: hue-rotate(90deg); transform: scale(0.98); box-shadow: 0 0 30px #ff00ff; }
            50% { opacity: 0.8; filter: hue-rotate(180deg); transform: scale(1.01); box-shadow: 0 0 50px #00ffff; }
            100% { opacity: 1; filter: hue-rotate(0deg); transform: scale(1); box-shadow: var(--glow-color); }
        }

        /* ==========================================================================
           2. SIDEBAR KIRI (RIWAYAT & MENU)
           ========================================================================== */
        .main-sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
            z-index: 100;
        }

        .sidebar-nav-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-new-chat {
            flex: 1;
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2), var(--glow-color);
            transition: all 0.3s;
        }
        body.coding-mode .btn-new-chat { color: #050f1e; font-weight: 700; }

        .history-section {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-item {
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88rem;
            color: var(--text-main);
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }

        .history-item:hover, .history-item.active {
            background-color: var(--hover-color);
            text-shadow: var(--glow-color);
        }
        .history-item.active {
            border-color: var(--border-color);
            font-weight: 600;
            box-shadow: inset var(--glow-color);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-sidebar-action {
            background: none;
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-sidebar-action:hover {
            background-color: var(--hover-color);
            box-shadow: var(--glow-color);
        }
        .btn-sidebar-action.danger:hover {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        /* STYLING KHUSUS TOMBOL NEON MODE */
        #codingModeBtn {
            border: 1px solid #00f0ff;
            color: #00f0ff;
            font-weight: 600;
        }
        body.coding-mode #codingModeBtn {
            background: #00f0ff;
            color: #050f1e;
            box-shadow: 0 0 15px #00f0ff;
        }

        /* ==========================================================================
           3. HALAMAN KONTEN UTAMA CHAT
           ========================================================================== */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
        }

        .app-header {
            padding: 18px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
            background: transparent;
        }

        .btn-toggle-menu {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .btn-toggle-menu:hover { background-color: var(--hover-color); }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.3s;
        }
        body.coding-mode .brand h1 {
            text-shadow: 0 0 10px #00f0ff;
        }

        .chat-area {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
            background: transparent;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            color: var(--text-muted);
            margin: auto 0;
        }

        .welcome-screen i {
            font-size: 3.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        body.coding-mode .welcome-screen i { filter: drop-shadow(0 0 10px #00f0ff); }

        /* BUBBLE CHAT */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
            position: relative;
            transition: all 0.3s;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: var(--user-msg-text);
            border-bottom-right-radius: 4px;
            box-shadow: var(--glow-color);
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
            padding-bottom: 40px; 
            backdrop-filter: blur(4px);
            box-shadow: var(--glow-color);
        }

        .message.ai p { margin-bottom: 10px; }
        .message img { max-width: 100%; max-height: 400px; border-radius: 12px; margin-bottom: 10px; object-fit: contain; }

        .typing-cursor::after {
            content: '▊';
            display: inline-block;
            margin-left: 3px;
            color: var(--text-muted);
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .ai-audio-control {
            position: absolute;
            bottom: 8px;
            left: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .ai-audio-control:hover {
            color: var(--text-main);
            background-color: var(--hover-color);
        }

        /* PANEL BAWAH (INPUT) */
        .input-panel {
            padding: 20px 28px;
            background-color: transparent;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .image-preview-container {
            display: none;
            align-items: center;
            background: var(--input-wrapper-bg);
            padding: 8px 12px;
            border-radius: 14px;
            width: max-content;
            max-width: 100%;
            border: 1px solid var(--border-color);
            gap: 10px;
            position: relative;
        }

        .image-preview-container img { height: 60px; width: 60px; object-fit: cover; border-radius: 8px; }

        .btn-remove-preview {
            background: #ef4444; color: white; border: none; width: 20px; height: 20px;
            border-radius: 50%; cursor: pointer; font-size: 10px; display: flex; align-items: center;
            justify-content: center; position: absolute; top: -5px; right: -5px;
        }

        .input-bar-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--input-wrapper-bg);
            border-radius: 30px;
            padding: 8px 10px 8px 20px;
            border: 1px solid transparent;
            transition: all 0.3s;
            gap: 12px;
        }

        .input-bar-wrapper:focus-within {
            background-color: var(--bg-container);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        body.dark-mode .input-bar-wrapper:focus-within { border-color: #ea580c; box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.15); }
        body.coding-mode .input-bar-wrapper:focus-within { border-color: #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }

        .input-bar-wrapper input { flex: 1; border: none; background: none; outline: none; font-size: 1rem; padding: 8px 0; color: var(--text-main); }
        .btn-action { background: none; border: none; color: var(--text-muted); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.15rem; transition: all 0.2s; }
        .btn-action:hover { background-color: var(--hover-color); color: var(--text-main); }
        .btn-send { background: var(--primary-gradient); color: white; }
        body.coding-mode .btn-send { color: #050f1e; }
        #fileInput { display: none; }

        /* MODAL OVERLAY UNTUK HP */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4); z-index: 90;
        }

        /* LOADING ANIMATION */
        .loading-dots { display: flex; gap: 6px; padding: 4px 0; }
        .dot { width: 8px; height: 8px; background-color: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* KOTAK CODING */
        .code-container { position: relative; margin: 12px 0; background: #1e1e2e; border-radius: 12px; overflow: hidden; border: 1px solid #313244; transition: all 0.3s; }
        body.coding-mode .code-container { border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
        .code-header { display: flex; justify-content: space-between; align-items: center; background: #11111b; padding: 8px 16px; font-size: 0.75rem; color: #a6adc8; font-family: monospace; border-bottom: 1px solid #313244; }
        body.coding-mode .code-header { border-bottom-color: #00f0ff; color: #00f0ff; }
        .btn-copy { background: #313244; color: #cdd6f4; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; }
        body.coding-mode .btn-copy { background: rgba(0, 240, 255, 0.1); color: #00f0ff; border: 1px solid #00f0ff; }
        .message pre { margin: 0; padding: 16px; overflow-x: auto; background: transparent !important; }
        .message code { font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; color: #f38ba8; background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px; }
        body.coding-mode .message code { color: #ff007f; background: rgba(0,0,0,0.2); }
        .message pre code { color: #cdd6f4 !important; background: transparent !important; padding: 0; border-radius: 0; display: block; white-space: pre; }
        body.coding-mode .message pre code { color: #00f0ff !important; }

        /* RESPONSIVITAS */
        @media (max-width: 768px) {
            .main-sidebar {
                position: fixed;
                left: 0; 
                top: 0; 
                height: 100%;
                transform: translateX(-100%);
                z-index: 1002; /* Di atas overlay */
            }
            .main-sidebar.active { transform: translateX(0); }
            
            /* Setel overlay agar benar-benar berada di tengah-tengah lapisan */
            .sidebar-overlay {
                z-index: 1001; 
                pointer-events: none; /* Saat tersembunyi, klik tembus ke belakang */
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            .sidebar-overlay.active { 
                display: block; 
                opacity: 1;
                pointer-events: auto; /* Saat aktif, baru bisa diklik untuk menutup */
            }
            
            .app-container { height: 100vh; height: 100dvh; margin: 0; border-radius: 0; border: none; z-index: 1000; }
            .app-header { padding: 12px 16px; }
            .chat-area { padding: 16px; }
            .message { max-width: 90%; }
            .input-panel { padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        }
        
    </style>
</head>
<body>

    <canvas id="galaxyCanvas"></canvas>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-container" id="appContainer">
        <aside class="main-sidebar" id="mainSidebar">
            <div class="sidebar-nav-header">
                <button class="btn-new-chat" id="newChatBtn">
                    <i class="fa-solid fa-plus"></i> Obrolan Baru
                </button>
            </div>
            
            <div class="history-section">
                <div class="history-title">Percakapan Terbaru</div>
                <div id="chatHistoryList">
                    </div>
            </div>

            <div class="sidebar-footer">
                <button class="btn-sidebar-action" id="codingModeBtn">
                    <i class="fa-solid fa-code"></i> Neon Coding Mode
                </button>
                <button class="btn-sidebar-action" id="themeToggleBtn">
                    <i class="fa-solid fa-moon"></i> Dark Mode (Gambar)
                </button>
                <button class="btn-sidebar-action danger" id="resetAllBtn">
                    <i class="fa-solid fa-trash-can"></i> Bersihkan Semua
                </button>
            </div>
        </aside>

        <div class="chat-container">
            <header class="app-header">
                <button class="btn-toggle-menu" id="menuToggleBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="brand">
                    <h1 id="brandTitle">E-BARIG AI</h1>
                </div>
            </header>

            <main class="chat-area" id="chatArea">
                <div class="welcome-screen" id="welcomeScreen">
                    <i class="fa-solid fa-wand-magic-sparkles" id="welcomeIcon"></i>
                    <h2 id="welcomeTitle">Apakah ada pertanyaan??</h2>
                    <p id="welcomeDesc">project ai pertama buatan sendiri, jadi kalo ada bug mohon untuk melapor. terimakasih</p>
                </div>
            </main>

            <footer class="input-panel">
                <div class="image-preview-container" id="previewContainer">
                    <button class="btn-remove-preview" id="removePreviewBtn"><i class="fa-solid fa-xmark"></i></button>
                    <img id="imagePreview" src="" alt="Pratinjau">
                    <span style="font-size: 0.8rem; color: var(--text-muted);" id="fileNameSpan">gambar.jpg</span>
                </div>

                <div class="input-bar-wrapper">
                    <input type="file" id="fileInput" accept="image/*">
                    <button class="btn-action" id="attachBtn" title="Unggah Foto Tugas/PR">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    
                    <input type="text" id="userInput" placeholder="Tanyakan sesuatu..." autocomplete="off">
                    
                    <button class="btn-action btn-send" id="sendBtn">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const p1 = "gsk_Zj5R";
        const p2 = "bxs4wFoCYpxaEL7D";
        const p3 = "WGdyb3FYOCMu1H37";
        const p4 = "zyvPB30MNRT8YQmZ";
        
        const GROQ_API_KEY = p1 + p2 + p3 + p4; 
        const MODEL_NAME = 'meta-llama/llama-4-scout-17b-16e-instruct'; 

        const appContainer = document.getElementById('appContainer');
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const welcomeTitle = document.getElementById('welcomeTitle');
        const welcomeDesc = document.getElementById('welcomeDesc');
        const welcomeIcon = document.getElementById('welcomeIcon');
        const brandTitle = document.getElementById('brandTitle');
        const fileInput = document.getElementById('fileInput');
        const attachBtn = document.getElementById('attachBtn');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const removePreviewBtn = document.getElementById('removePreviewBtn');
        const fileNameSpan = document.getElementById('fileNameSpan');

        const mainSidebar = document.getElementById('mainSidebar');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatHistoryList = document.getElementById('chatHistoryList');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const codingModeBtn = document.getElementById('codingModeBtn');
        const resetAllBtn = document.getElementById('resetAllBtn');
        
        let isDarkModeActive = false;
        let isCodingModeActive = false;
        let allConversations = JSON.parse(localStorage.getItem('ebarig_chats')) || {};
        let currentSessionId = null;

        // ==========================================================================
        // ANIMASI CANVAS GALAKSI
        // ==========================================================================
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 130;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        for (let i = 0; i < numStars; i++) {
            let angle = Math.random() * Math.PI * 2;
            let distance = Math.random() * (Math.max(canvas.width, canvas.height) / 1.5);
            stars.push({
                distance: distance,
                angle: angle,
                size: Math.random() * 1.8 + 0.5,
                speed: (Math.random() * 0.0008 + 0.0002) * (150 / (distance + 60)),
                color: i % 2 === 0 ? 'rgba(37, 99, 235, ' : 'rgba(124, 58, 237, '
            });
        }

        function animateGalaxy() {
            if (document.body.classList.contains('coding-mode')) {
                ctx.fillStyle = 'rgba(5, 15, 30, 0.2)';
            } else {
                ctx.fillStyle = document.body.classList.contains('dark-mode') ? 'rgba(15, 23, 42, 0.2)' : 'rgba(241, 245, 249, 0.2)';
            }
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            stars.forEach(star => {
                star.angle += star.speed;
                let x = centerX + Math.cos(star.angle) * star.distance;
                let y = centerY + Math.sin(star.angle) * star.distance;

                ctx.beginPath();
                ctx.arc(x, y, star.size, 0, Math.PI * 2);
                
                let opacity = '0.45)';
                if (document.body.classList.contains('coding-mode')) {
                    opacity = '0.9)';
                    ctx.fillStyle = 'rgba(0, 240, 255, ' + opacity;
                } else {
                    opacity = document.body.classList.contains('dark-mode') ? '0.85)' : '0.45)';
                    ctx.fillStyle = star.color + opacity;
                }
                ctx.fill();
            });
            requestAnimationFrame(animateGalaxy);
        }
        animateGalaxy();

        // ==========================================================================
        // LOGIKA INTERAKSI & THEME TOGGLE
        // ==========================================================================
        function toggleSidebar() {
            mainSidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        }
        menuToggleBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // FIX UNTUK HP: MENGAKTIFKAN CODING MODE
        codingModeBtn.addEventListener('click', () => {
            isCodingModeActive = !isCodingModeActive;
            isDarkModeActive = false; // Matikan mode gambar jika coding aktif
            window.speechSynthesis.cancel();

            // Jalankan efek animasi transisi flash glitch
            appContainer.classList.add('flash-animation');
            setTimeout(() => appContainer.classList.remove('flash-animation'), 400);

            if (isCodingModeActive) {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('coding-mode');
                
                brandTitle.textContent = "E-BARIG AI [CODING]";
                attachBtn.style.display = "none";
                userInput.placeholder = "Ketik perintah coding, struktur algoritma, atau cari bug...";
                
                welcomeIcon.className = "fa-solid fa-terminal";
                welcomeTitle.textContent = "Terminal Siap. Tulis Kodemu!";
                welcomeDesc.textContent = "Neon Coding Mode aktif. AI difokuskan penuh untuk menulis kode bersih, arsitektur data, dan perbaikan bug super cepat.";
                clearImagePreview();
            } else {
                document.body.classList.remove('coding-mode');
                resetToWhiteModeText();
            }
            
            // Beri jeda sedikit di HP agar animasinya sempat berjalan sebelum menu menutup
            if(window.innerWidth <= 768) {
                setTimeout(toggleSidebar, 150);
            }
        });

        // FIX UNTUK HP: Mode Gambar (Dark Mode)
        themeToggleBtn.addEventListener('click', () => {
            isDarkModeActive = !isDarkModeActive;
            isCodingModeActive = false; // Matikan mode coding jika gambar aktif
            window.speechSynthesis.cancel();
            
            appContainer.classList.add('flash-animation');
            setTimeout(() => appContainer.classList.remove('flash-animation'), 400);

            if (isDarkModeActive) {
                document.body.classList.remove('coding-mode');
                document.body.classList.add('dark-mode');
                themeToggleBtn.innerHTML = `<i class="fa-solid fa-sun"></i> White Mode (Teks)`;
                brandTitle.textContent = "E-BARIG AI";
                attachBtn.style.display = "none"; 
                userInput.placeholder = "Ketik deskripsi gambar...";
                welcomeIcon.className = "fa-solid fa-wand-magic-sparkles";
                welcomeTitle.textContent = "Ingin Gambar Apa?";
                welcomeDesc.textContent = "Mode Pembuat Gambar aktif. Ketik apa saja, AI langsung melukisnya.";
                clearImagePreview();
            } else {
                document.body.classList.remove('dark-mode');
                resetToWhiteModeText();
            }
            
            // Beri jeda sedikit di HP agar animasinya sempat berjalan sebelum menu menutup
            if(window.innerWidth <= 768) {
                setTimeout(toggleSidebar, 150);
            }
        });

        function resetToWhiteModeText() {
            themeToggleBtn.innerHTML = `<i class="fa-solid fa-moon"></i> Dark Mode (Gambar)`;
            brandTitle.textContent = "E-BARIG AI";
            attachBtn.style.display = "flex"; 
            userInput.placeholder = "Tanyakan sesuatu...";
            welcomeIcon.className = "fa-solid fa-wand-magic-sparkles";
            welcomeTitle.textContent = "Apakah ada pertanyaan?";
            welcomeDesc.textContent = "project ai pertama buatan sendiri, jadi kalo ada bug mohon untuk melapor. terimakasih";
        }

        attachBtn.addEventListener('click', (e) => { e.preventDefault(); fileInput.click(); });
        let currentBase64Image = null;

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'flex';
                    currentBase64Image = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });
        removePreviewBtn.addEventListener('click', () => clearImagePreview());
        function clearImagePreview() { fileInput.value = ''; currentBase64Image = null; previewContainer.style.display = 'none'; imagePreview.src = ''; }

        function renderHistoryList() {
            chatHistoryList.innerHTML = '';
            const sortedSessions = Object.keys(allConversations).sort((a,b) => b - a);
            
            if(sortedSessions.length === 0) {
                chatHistoryList.innerHTML = `<div style="font-size:0.8rem; color:var(--text-muted); padding:10px;">Belum ada obrolan</div>`;
                return;
            }

            sortedSessions.forEach(id => {
                const item = document.createElement('div');
                item.classList.add('history-item');
                if(id === currentSessionId) item.classList.add('active');
                item.innerHTML = `<i class="fa-regular fa-message"></i> <span>${allConversations[id].title}</span>`;
                
                item.addEventListener('click', () => {
                    loadChatSession(id);
                    if(window.innerWidth <= 768) toggleSidebar();
                });
                chatHistoryList.appendChild(item);
            });
        }

        function startNewChatSession() {
            window.speechSynthesis.cancel();
            currentSessionId = null;
            chatArea.innerHTML = '';
            clearImagePreview();
            if (welcomeScreen) {
                welcomeScreen.style.display = 'flex';
                chatArea.appendChild(welcomeScreen);
            }
            renderHistoryList();
        }
        newChatBtn.addEventListener('click', () => {
            startNewChatSession();
            if(window.innerWidth <= 768) toggleSidebar();
        });

        function loadChatSession(id) {
            window.speechSynthesis.cancel();
            currentSessionId = id;
            chatArea.innerHTML = '';
            const session = allConversations[id];
            
            if(session.messages.length > 0) {
                if (welcomeScreen) welcomeScreen.style.display = 'none';
                session.messages.forEach(msg => {
                    if(msg.role === 'user') {
                        appendUserMessage(msg.text, msg.image, false);
                    } else {
                        appendAiMessage(msg.text, msg.hasVoice, false, false);
                    }
                });
            } else {
                if (welcomeScreen) welcomeScreen.style.display = 'flex';
                chatArea.appendChild(welcomeScreen);
            }
            renderHistoryList();
        }

        function saveMessageToLocalStorage(role, text, image = null, hasVoice = true) {
            if(!currentSessionId) {
                currentSessionId = Date.now().toString();
                let cleanTitle = text ? text.substring(0, 22) + '...' : 'Analisis Gambar';
                allConversations[currentSessionId] = { title: cleanTitle, messages: [] };
            }
            allConversations[currentSessionId].messages.push({ role, text, image, hasVoice });
            localStorage.setItem('ebarig_chats', JSON.stringify(allConversations));
            renderHistoryList();
        }

        resetAllBtn.addEventListener('click', () => {
            if(confirm("Apakah kamu yakin ingin mereset dan menghapus seluruh riwayat percakapan?")) {
                window.speechSynthesis.cancel();
                allConversations = {};
                localStorage.removeItem('ebarig_chats');
                startNewChatSession();
            }
        });

        // ==========================================================================
        // PROSES PENGIRIMAN & EFEK TYPING
        // ==========================================================================
        async function handleSendMessage() {
            const text = userInput.value.trim();
            if (!text && !currentBase64Image) return;

            if (welcomeScreen) welcomeScreen.style.display = 'none';

            appendUserMessage(text, currentBase64Image, true);
            userInput.value = '';
            const loadingId = appendLoadingIndicator();

            // 1. Jalur Mode Gambar (Dark Mode)
            if (isDarkModeActive) {
                try {
                    clearImagePreview();
                    const randomSeed = Math.floor(Math.random() * 999999);
                    const encodedPrompt = encodeURIComponent(text);
                    const imageUrlHasil = `https://image.pollinations.ai/p/${encodedPrompt}?width=1024&height=1024&seed=${randomSeed}&enhance=true`;

                    await new Promise(resolve => setTimeout(resolve, 2500));
                    removeLoadingIndicator(loadingId);
                    
                    let teksRespon = `Berikut hasil lukisan gambar untuk **"${text}"**: \n\n<img src="${imageUrlHasil}" alt="${text}">`;
                    appendAiMessage(teksRespon, false, true, true); 
                    return; 
                } catch (imgError) {
                    removeLoadingIndicator(loadingId);
                    appendAiMessage("⚠️ Gagal melukis gambar.", false, true, true);
                    return;
                }
            }

            // 2. Jalur Teks Biasa & Coding Mode
            const base64Data = currentBase64Image;
            clearImagePreview();

            try {
                let messageContent = [{ type: "text", text: text || "Tolong analisis gambar ini." }];
                if (base64Data) messageContent.push({ type: "image_url", image_url: { url: base64Data } });

                // Penyesuaian instruksi kepribadian AI berdasarkan Coding Mode aktif/tidak
                let instruksiSifatAI = "Anda adalah Guru Privat Digital bernama E-BARIG AI yang dibuat oleh Agung (Tole). Anda sangat sabar, jujur, baik hati, ramah, tenang, terstruktur, dan menjelaskan materi pelajaran dengan penuh kelembutan.";
                
                if (isCodingModeActive) {
                    instruksiSifatAI = "Anda adalah Senior Software Engineer dan Pakar Coding jenius bernama E-BARIG AI [CODING MODE] yang dibuat oleh Agung (Tole). Fokus utama Anda adalah langsung memberikan solusi baris kode secara rapi, bersih, efisien, terstruktur, dan berikan penjelasan singkat berbasis dokumentasi teknis tingkat tinggi tanpa basa-basi pembuka yang panjang.";
                }

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            { role: "system", content: instruksiSifatAI },
                            { role: "user", content: messageContent }
                        ],
                        temperature: isCodingModeActive ? 0.2 : 0.6 // Suhu lebih rendah agar kode akurat
                    })
                });

                if (!response.ok) throw new Error("Koneksi API bermasalah.");
                const data = await response.json();
                const aiResult = data.choices[0].message.content;

                removeLoadingIndicator(loadingId);
                // Jangan pakai suara (TTS) otomatis jika sedang di mode Coding karena aneh membaca baris kode
                appendAiMessage(aiResult, !isCodingModeActive, true, true);

            } catch (error) {
                removeLoadingIndicator(loadingId);
                appendAiMessage(`⚠️ Gagal memproses: ${error.message}`, false, true, true);
            }
        }

        function appendUserMessage(text, imageSrc, shouldSave = true) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'user');
            if (imageSrc) {
                const img = document.createElement('img');
                img.src = imageSrc;
                msgDiv.appendChild(img);
            }
            if (text) {
                const txtNode = document.createElement('span');
                txtNode.innerHTML = text.replace(/\n/g, '<br>');
                msgDiv.appendChild(txtNode);
            }
            chatArea.appendChild(msgDiv);
            scrollToBottom();
            if(shouldSave) saveMessageToLocalStorage('user', text, imageSrc, true);
        }

        function appendAiMessage(fullMarkdownText, includeVoiceOption = true, shouldSave = true, animate = true) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'ai');
            chatArea.appendChild(msgDiv);

            if (animate && !fullMarkdownText.includes('<img')) {
                msgDiv.classList.add('typing-cursor');
                const words = fullMarkdownText.split(/(\s+)/);
                let currentWordIndex = 0;
                let currentText = "";

                function typeNextWord() {
                    if (currentWordIndex < words.length) {
                        currentText += words[currentWordIndex];
                        msgDiv.innerHTML = marked.parse(currentText);
                        currentWordIndex++;
                        scrollToBottom();
                        setTimeout(typeNextWord, 20); 
                    } else {
                        msgDiv.classList.remove('typing-cursor');
                        finishAiMessageRendering(msgDiv, fullMarkdownText, includeVoiceOption);
                    }
                }
                typeNextWord();
            } else {
                msgDiv.innerHTML = marked.parse(fullMarkdownText);
                finishAiMessageRendering(msgDiv, fullMarkdownText, includeVoiceOption);
            }

            if(shouldSave) saveMessageToLocalStorage('ai', fullMarkdownText, null, includeVoiceOption);
        }

        function finishAiMessageRendering(msgDiv, fullMarkdownText, includeVoiceOption) {
            if (includeVoiceOption) {
                const audioBtn = document.createElement('button');
                audioBtn.classList.add('ai-audio-control');
                audioBtn.innerHTML = `<i class="fa-solid fa-volume-high"></i> Dengarkan`;
                
                const cleanText = msgDiv.innerText.replace(/Salin/g, '').trim();

                audioBtn.addEventListener('click', () => {
                    if (window.speechSynthesis.speaking) {
                        window.speechSynthesis.cancel();
                        audioBtn.innerHTML = `<i class="fa-solid fa-volume-high"></i> Dengarkan`;
                    } else {
                        const utterance = new SpeechSynthesisUtterance(cleanText);
                        utterance.lang = 'id-ID';
                        utterance.onstart = () => audioBtn.innerHTML = `<i class="fa-solid fa-stop" style="color: #ef4444;"></i> Berhenti`;
                        utterance.onend = () => audioBtn.innerHTML = `<i class="fa-solid fa-volume-high"></i> Dengarkan`;
                        window.speechSynthesis.speak(utterance);
                    }
                });
                msgDiv.appendChild(audioBtn);
            }
            scrollToBottom();
        }

        function appendLoadingIndicator() {
            const loadingDiv = document.createElement('div');
            const uniqueId = 'loader-' + Date.now();
            loadingDiv.id = uniqueId;
            loadingDiv.classList.add('message', 'ai');
            loadingDiv.innerHTML = `<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            chatArea.appendChild(loadingDiv);
            scrollToBottom();
            return uniqueId;
        }

        function removeLoadingIndicator(id) { const el = document.getElementById(id); if (el) el.remove(); }
        function scrollToBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

        sendBtn.addEventListener('click', handleSendMessage);
        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleSendMessage(); } });

        renderHistoryList();

        const renderer = new marked.Renderer();
        renderer.code = function(codeInfo, infostring) {
            const code = typeof codeInfo === 'string' ? codeInfo : codeInfo.text;
            const lang = typeof codeInfo === 'string' ? (infostring || 'code') : (codeInfo.lang || 'code');
            const escapedCode = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return `<div class="code-container"><div class="code-header"><span><i class="fa-solid fa-code"></i> ${lang}</span><button class="btn-copy" onclick="copyCodeText(this)"><i class="fa-regular fa-copy"></i> Salin</button></div><pre><code class="language-${lang}">${escapedCode}</code></pre></div>`;
        };
        marked.setOptions({ renderer: renderer });

        window.copyCodeText = function(buttonElement) {
            const codeContainer = buttonElement.closest('.code-container');
            const codeText = codeContainer.querySelector('code').innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                buttonElement.innerHTML = `<i class="fa-solid fa-check" style="color: #a6e3a1;"></i> Tersalin!`;
                setTimeout(() => { buttonElement.innerHTML = `<i class="fa-regular fa-copy"></i> Salin`; }, 2000);
            });
        };
    </script>
